<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theory Reactor | OpenAI Codex</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(13, 27, 46, 0.9);
      --panel-soft: rgba(18, 38, 64, 0.72);
      --line: rgba(132, 190, 255, 0.22);
      --line-strong: rgba(255, 214, 112, 0.46);
      --text: #d8e3ff;
      --muted: #91a0bd;
      --bright: #ffffff;
      --cyan: #38b6ff;
      --teal: #00d2b8;
      --amber: #ffc857;
      --rust: #ff7a45;
      --violet: #9b8cff;
      --green: #7ddf64;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      --body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --heading: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        var(--bg);
      background-size: 44px 44px;
      color: var(--text);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.6;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1180px, 92vw);
      margin: 0 auto;
      padding: 3rem 0 4rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .return-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .return-link:hover {
      color: var(--amber);
      transform: translateX(-3px);
    }

    .return-link svg {
      width: 18px;
      height: 18px;
    }

    .language {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .lang-btn,
    .chip,
    .lens-btn,
    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(13, 27, 46, 0.55);
      color: var(--text);
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .lang-btn {
      padding: 0.35rem 0.62rem;
      color: var(--cyan);
      font-weight: 700;
    }

    .lang-btn.active,
    .lang-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255, 200, 87, 0.1);
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .title-panel,
    .mission-panel,
    .map-panel,
    .console-panel,
    .lens-panel,
    .synthesis-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .title-panel {
      padding: clamp(1.2rem, 3vw, 2rem);
    }

    .kicker {
      color: var(--amber);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.85rem;
    }

    h1,
    h2,
    h3 {
      color: var(--bright);
      font-family: var(--heading);
      line-height: 1.08;
    }

    h1 {
      max-width: 720px;
      font-size: clamp(2.4rem, 6vw, 5rem);
      margin-bottom: 1rem;
    }

    .lead {
      max-width: 70ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.16rem);
    }

    .mission-panel {
      display: grid;
      align-content: space-between;
      gap: 1rem;
      padding: 1.25rem;
      background: linear-gradient(135deg, rgba(56, 182, 255, 0.13), rgba(255, 122, 69, 0.12)), var(--panel);
    }

    .mission-title {
      color: var(--bright);
      font-weight: 800;
      margin-bottom: 0.35rem;
    }

    .mission-panel p {
      color: var(--text);
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .signal {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 0.7rem;
      background: rgba(0, 0, 0, 0.12);
    }

    .signal strong {
      display: block;
      color: var(--amber);
      font-size: 1.1rem;
    }

    .signal span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .reactor-grid {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(340px, 0.86fr);
      gap: 1rem;
      align-items: stretch;
    }

    .map-panel,
    .console-panel,
    .lens-panel,
    .synthesis-panel {
      padding: 1rem;
    }

    .panel-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    h2 {
      font-size: clamp(1.35rem, 2.4vw, 2rem);
    }

    .panel-note {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .canvas-wrap {
      position: relative;
      min-height: 360px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(155, 140, 255, 0.08), rgba(0, 210, 184, 0.06)),
        rgba(5, 13, 24, 0.74);
    }

    #theory-map {
      display: block;
      width: 100%;
      height: 360px;
    }

    .map-readout {
      position: absolute;
      left: 0.75rem;
      right: 0.75rem;
      bottom: 0.75rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      pointer-events: none;
    }

    .readout-item {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(8, 17, 31, 0.72);
      padding: 0.5rem;
    }

    .readout-item strong {
      display: block;
      color: var(--bright);
      font-size: 0.78rem;
    }

    .readout-item span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.35;
    }

    .lens-strip,
    .mix-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.55rem;
      margin-top: 0.85rem;
    }

    .lens-btn,
    .chip {
      min-height: 48px;
      padding: 0.65rem 0.7rem;
      text-align: left;
      color: var(--text);
      font-weight: 700;
    }

    .lens-btn span,
    .chip span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 500;
      line-height: 1.25;
      margin-top: 0.12rem;
    }

    .lens-btn:hover,
    .lens-btn.active,
    .chip:hover,
    .chip.active {
      transform: translateY(-2px);
      background: rgba(56, 182, 255, 0.11);
      border-color: var(--line-strong);
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      color: var(--bright);
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(7, 16, 29, 0.92);
      color: var(--text);
      padding: 0.72rem 0.8rem;
    }

    .slider-stack {
      display: grid;
      gap: 0.8rem;
      margin: 1rem 0;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 150px 1fr 38px;
      gap: 0.75rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--amber);
    }

    .value {
      color: var(--bright);
      text-align: right;
      font-weight: 800;
    }

    .ranking {
      display: grid;
      gap: 0.5rem;
      margin: 1rem 0;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 94px 1fr 42px;
      gap: 0.65rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .rank-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .rank-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--cyan);
    }

    .analysis-box {
      display: grid;
      gap: 0.75rem;
      border-top: 1px solid var(--line);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .analysis-row {
      border-left: 3px solid var(--cyan);
      padding-left: 0.75rem;
    }

    .analysis-row strong {
      display: block;
      color: var(--bright);
      margin-bottom: 0.15rem;
    }

    .analysis-row p {
      color: var(--muted);
    }

    .lower-grid {
      display: grid;
      grid-template-columns: 0.82fr 1.18fr;
      gap: 1rem;
      margin-top: 1rem;
    }

    .lens-title {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.75rem;
    }

    .lens-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px currentColor;
    }

    .lens-panel h2 {
      margin: 0;
    }

    .lens-question {
      color: var(--amber);
      font-weight: 800;
      margin-bottom: 0.65rem;
    }

    .lens-body {
      color: var(--text);
      margin-bottom: 1rem;
    }

    .moves {
      display: grid;
      gap: 0.6rem;
    }

    .move {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.035);
      padding: 0.75rem;
    }

    .move strong {
      display: block;
      color: var(--bright);
      margin-bottom: 0.18rem;
    }

    .move span {
      color: var(--muted);
    }

    .mix-strip {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .chip {
      text-align: center;
      min-height: 44px;
      font-size: 0.86rem;
    }

    .brief {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem;
      margin-top: 0.9rem;
    }

    .brief-step {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.14);
      padding: 0.85rem;
    }

    .brief-step strong {
      display: block;
      color: var(--amber);
      margin-bottom: 0.25rem;
    }

    .brief-step span {
      color: var(--muted);
    }

    .ghost-btn {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      color: var(--cyan);
      font-weight: 800;
    }

    .ghost-btn:hover {
      color: var(--bg);
      border-color: var(--amber);
      background: var(--amber);
      transform: translateY(-2px);
    }

    @media (max-width: 960px) {
      .intro,
      .reactor-grid,
      .lower-grid {
        grid-template-columns: 1fr;
      }

      .mix-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: 92vw;
        padding-top: 2rem;
      }

      .signal-grid,
      .map-readout,
      .lens-strip,
      .brief {
        grid-template-columns: 1fr;
      }

      .slider-row,
      .rank-row {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }

      .value {
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <nav class="topbar">
      <a class="return-link" id="return-link" href="toolbox.html#tool-codex">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span id="return-label"></span>
      </a>
      <div class="language">
        <span id="language-label"></span>

        <button type="button" class="lang-btn" id="lang-en">EN</button>
      </div>
    </nav>

    <section class="intro">
      <div class="title-panel">
        <div class="kicker" id="kicker"></div>
        <h1 id="page-title"></h1>

      </div>
      <aside class="mission-panel">
        <div>
          <div class="mission-title" id="mission-title"></div>
          <p id="mission-text"></p>
        </div>
        <div class="signal-grid">
          <div class="signal"><strong>6</strong><span id="signal-lenses"></span></div>

          <div class="signal"><strong>1</strong><span id="signal-brief"></span></div>
        </div>
      </aside>
    </section>

    <section class="reactor-grid">
      <div class="map-panel">
        <div class="panel-heading">
          <h2 id="map-title"></h2>
          <span class="panel-note" id="map-note"></span>
        </div>

        <div class="lens-strip" id="lens-strip"></div>

      <div class="console-panel">
        <div class="panel-heading">
          <h2 id="console-title"></h2>
          <span class="panel-note" id="console-note"></span>
        </div>
        <div class="field">
          <label for="scenario-select" id="scenario-label"></label>
          <select id="scenario-select"></select>
        </div>
        <div class="slider-stack" id="slider-stack"></div>
        <div class="ranking" id="ranking"></div>
        <div class="analysis-box" id="analysis-box"></div>
      </div>
    </section>

    <section class="lower-grid">
      <div class="lens-panel">
        <div class="lens-title">
          <span class="lens-dot" id="lens-dot"></span>
          <h2 id="lens-name"></h2>
        </div>
        <div class="lens-question" id="lens-question"></div>
        <p class="lens-body" id="lens-body"></p>
        <div class="moves" id="moves"></div>
      </div>

      <div class="synthesis-panel">
        <div class="panel-heading">
          <h2 id="synthesis-title"></h2>
          <span class="panel-note" id="synthesis-note"></span>
        </div>
        <div class="mix-strip" id="mix-strip"></div>
        <div class="brief" id="brief"></div>
        <button type="button" class="ghost-btn" id="randomize-btn"></button>
      </div>
    </section>
  </main>

    function lensById(id) {
      return LENSES.find(lens => lens.id === id);
    }

    function scenarioById(id) {
      return SCENARIOS.find(scenario => scenario.id === id);
    }

    function scoreLens(lens) {
      const keys = Object.keys(sliders);
      const raw = keys.reduce((sum, key) => sum + (100 - Math.abs(sliders[key] - lens.weights[key])), 0);
      return Math.round(raw / keys.length);
    }

    function rankedLenses() {
      return [...LENSES].map(lens => ({ lens, score: scoreLens(lens) })).sort((a, b) => b.score - a.score);
    }

    function applyScenario(id) {
      activeScenario = id;
      sliders = { ...scenarioById(id).sliders };
      activeLens = rankedLenses()[0].lens.id;
      render();
    }

    function renderSliders() {
      const t = UI[lang];
      el("slider-stack").innerHTML = Object.entries(t.dims).map(([key, label]) => `

          <span>${label}</span>
          <input type="range" min="0" max="100" value="${sliders[key]}" data-dim="${key}" aria-label="${label}">
          <span class="value">${sliders[key]}</span>
        </div>
      `).join("");
      document.querySelectorAll("input[type='range']").forEach(input => {
        input.addEventListener("input", event => {
          sliders[event.target.dataset.dim] = Number(event.target.value);
          renderDynamic();
        });
      });
    }

          ${tx(lens.name).split(" ")[0]}
          <span>${tx(lens.tag).split(" ").slice(0, 3).join(" ")}</span>
        </button>
      `).join("");
      document.querySelectorAll("[data-mix]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.dataset.mix;
          if (mix.includes(id)) {
            mix = mix.filter(item => item !== id);
          } else {
            mix = [...mix, id].slice(-3);
          }
          if (mix.length === 0) mix = [activeLens];
          renderDynamic();
        });
      });
    }

    function renderBrief() {
      const t = UI[lang];
      const selected = mix.map(lensById);
      const steps = ["entry", "architecture", "ethics", "evidence"];
      el("brief").innerHTML = steps.map((step, index) => {
        const lens = selected[index % selected.length];
        return `
          <div class="brief-step" style="border-color:${lens.color}66">
            <strong>${t.brief[step]}</strong>
            <span>${tx(lens.brief[step])}</span>
          </div>
        `;
      }).join("");
    }

    function renderDynamic() {
      renderSliders();
      renderLensStrip();
      renderRanking();
      renderAnalysis();
      renderLensPanel();
      renderMix();
      renderBrief();
      drawMap();
    }

    function render() {
      renderStatic();
      renderScenarioSelect();
      renderMapReadout();
      renderDynamic();
    }

    function drawMap() {
      const canvas = el("theory-map");
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      const center = { x: w * 0.5, y: h * 0.47 };
      const ranking = rankedLenses();
      const bestIds = ranking.slice(0, 3).map(item => item.lens.id);

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 10; i++) {
        const y = 24 + i * 32;
        ctx.beginPath();
        ctx.moveTo(24, y);
        ctx.lineTo(w - 24, y);
        ctx.stroke();
      }

      LENSES.forEach(lens => {
        const x = lens.x * w;
        const y = lens.y * h;
        const pulse = Math.sin(animationTime / 34 + x * 0.01) * 3;
        const strong = lens.id === activeLens || bestIds.includes(lens.id);

        ctx.beginPath();
        ctx.moveTo(center.x, center.y);
        ctx.lineTo(x, y);
        ctx.strokeStyle = strong ? `${lens.color}aa` : "rgba(255,255,255,0.12)";
        ctx.lineWidth = strong ? 2 : 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y, strong ? 18 + pulse : 13, 0, Math.PI * 2);
        ctx.fillStyle = strong ? `${lens.color}33` : "rgba(255,255,255,0.06)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, strong ? 8 : 6, 0, Math.PI * 2);
        ctx.fillStyle = lens.color;
        ctx.fill();

        ctx.font = "700 12px Inter, sans-serif";
        ctx.fillStyle = lens.id === activeLens ? "#ffffff" : "#d8e3ff";
        ctx.textAlign = "center";
        ctx.fillText(tx(lens.name).split(" ")[0], x, y + 32);
      });

      ctx.beginPath();
      ctx.arc(center.x, center.y, 26, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 200, 87, 0.18)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 200, 87, 0.8)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = "800 11px Inter, sans-serif";
      ctx.fillStyle = "#ffc857";
      ctx.textAlign = "center";
      ctx.fillText(lang === "cz" ? "DILEMA" : "DILEMMA", center.x, center.y + 4);
    }

    function animate() {
      animationTime += 1;
      drawMap();
      requestAnimationFrame(animate);
    }

    function handleCanvasClick(event) {
      const rect = el("theory-map").getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const hit = LENSES.find(lens => {
        const dx = lens.x * rect.width - x;
        const dy = lens.y * rect.height - y;
        return Math.sqrt(dx * dx + dy * dy) < 32;
      });
      if (hit) {
        activeLens = hit.id;
        renderDynamic();
      }
    }

    function randomizeMix() {
      const pool = [...LENSES].sort(() => Math.random() - 0.5);
      mix = pool.slice(0, 3).map(lens => lens.id);
      activeLens = mix[0];
      renderDynamic();
    }

    el("lang-cz").addEventListener("click", () => setLanguage("cz"));
    el("lang-en").addEventListener("click", () => setLanguage("en"));
    el("scenario-select").addEventListener("change", event => applyScenario(event.target.value));
    el("theory-map").addEventListener("click", handleCanvasClick);
    el("randomize-btn").addEventListener("click", randomizeMix);
    window.addEventListener("resize", drawMap);

    render();
    animate();
  </script>
</body>

</html>
